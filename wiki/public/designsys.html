  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ar(--accent-h));\n  --accent-800: oklch(0.280 0.120 var(--accent-h));\n  --accent-900: oklch(0.200 0.080 var(--accent-h));\n  --accent: var(--accent-500);\n  --accent-hover: var(--accent-600);\n  --accent-fg: #ffffff;\n  --accent-tint: var(--accent-50);\n  --accent-ring: color-mix(in oklch, var(--accent-500) 35%, transparent);\n\n  /* Buttons */\n  --btn-primary-bg: var(--accent-500);\n  --btn-primary-text: var(--accent-fg);\n  --btn-primary-hover: var(--accent-600);\n  --btn-disabled-bg: #dedede;\n  --btn-disabled-text: #a3a3a3;\n\n  /* ── Semantic state tokens (OKLCH ramp — shared with badges) ── */\n  --success-bg:   oklch(0.955 0.035 155);\n  --success-text: oklch(0.420 0.140 155);\n  --success-border: oklch(0.860 0.070 155);\n  --success-solid: oklch(0.520 0.150 155);\n  --warning-bg:   oklch(0.960 0.045 82);\n  --warning-text: oklch(0.440 0.140 70);\n  --warning-border: oklch(0.850 0.090 82);\n  --warning-solid: oklch(0.600 0.160 70);\n  --danger-bg:    oklch(0.960 0.035 25);\n  --danger-text:  oklch(0.460 0.170 25);\n  --danger-border: oklch(0.860 0.080 25);\n  --danger-solid: oklch(0.560 0.200 25);\n  --info-bg:      var(--accent-100);\n  --info-text:    var(--accent-700);\n  --info-border:  var(--accent-200);\n  --info-solid:   var(--accent-500);\n\n  /* ── Paper (article long-form surface) ── */\n  --paper:          oklch(0.985 0.005 85);\n  --paper-border:   oklch(0.900 0.008 85);\n  --paper-rule:     oklch(0.860 0.008 85);\n\n  /* Wiki surfaces */\n  --wiki-link: var(--accent-500);\n  --wiki-link-hover: var(--accent-700);\n  --wiki-sidebar-text: #555555;\n  --wiki-nav-border: #a2a9b1;\n  --wiki-toc-border: #a2a9b1;\n  --wiki-count: #72777d;\n  --wiki-chevron: #72777d;\n  --wiki-title: #202122;\n  --wiki-article-text: #333333;\n  --wiki-article-h2: #202122;\n  --wiki-meta-line: #a2a9b1;\n  --wiki-card-border: #a2a9b1;\n  --wiki-search-border: #a2a9b1;\n  --wiki-search-placeholder: #72777d;\n  /* Wiki chip — accent-tinted */\n  --wiki-chip-bg: var(--accent-100);\n  --wiki-chip-border: var(--accent-300);\n  --wiki-chip-text: var(--accent-700);\n\n  /* Wiki type badges — unified OKLCH ramp: vary only hue.\n     bg oklch(0.955 0.035 H) · text oklch(0.340 0.180 H) · border oklch(0.660 0.150 H) */\n  --wiki-type-log-bg:         oklch(0.955 0.015 260);\n  --wiki-type-log-text:       oklch(0.350 0.050 260);\n  --wiki-type-log-border:     oklch(0.640 0.050 260);\n  --wiki-type-research-bg:    oklch(0.955 0.035 295);\n  --wiki-type-research-text:  oklch(0.340 0.180 295);\n  --wiki-type-research-border:oklch(0.660 0.150 295);\n  --wiki-type-belief-bg:      oklch(0.955 0.035 255);\n  --wiki-type-belief-text:    oklch(0.340 0.180 255);\n  --wiki-type-belief-border:  oklch(0.660 0.150 255);\n  --wiki-type-decision-bg:    oklch(0.955 0.035 50);\n  --wiki-type-decision-text:  oklch(0.340 0.180 50);\n  --wiki-type-decision-border:oklch(0.660 0.150 50);\n  --wiki-type-project-bg:     oklch(0.955 0.035 215);\n  --wiki-type-project-text:   oklch(0.340 0.180 215);\n  --wiki-type-project-border: oklch(0.660 0.150 215);\n  --wiki-type-objective-bg:   oklch(0.955 0.035 80);\n  --wiki-type-objective-text: oklch(0.340 0.180 80);\n  --wiki-type-objective-border:oklch(0.660 0.150 80);\n  --wiki-type-skill-bg:       oklch(0.955 0.035 155);\n  --wiki-type-skill-text:     oklch(0.340 0.180 155);\n  --wiki-type-skill-border:   oklch(0.660 0.150 155);\n  --wiki-type-agent-bg:       oklch(0.955 0.035 325);\n  --wiki-type-agent-text:     oklch(0.340 0.180 325);\n  --wiki-type-agent-border:   oklch(0.660 0.150 325);\n  --wiki-type-voice-bg:       oklch(0.955 0.035 350);\n  --wiki-type-voice-text:     oklch(0.340 0.180 350);\n  --wiki-type-voice-border:   oklch(0.660 0.150 350);\n  --wiki-type-principles-bg:  oklch(0.955 0.035 20);\n  --wiki-type-principles-text:oklch(0.340 0.190 20);\n  --wiki-type-principles-border:oklch(0.660 0.160 20);\n  --wiki-type-people-bg:      oklch(0.955 0.035 105);\n  --wiki-type-people-text:    oklch(0.340 0.180 105);\n  --wiki-type-people-border:  oklch(0.660 0.150 105);\n  --wiki-type-entry-bg:       oklch(0.960 0.003 260);\n  --wiki-type-entry-text:     oklch(0.360 0.015 260);\n  --wiki-type-entry-border:   oklch(0.660 0.030 260);\n  --wiki-type-fragment-bg:    oklch(0.960 0.003 260);\n  --wiki-type-fragment-text:  oklch(0.360 0.015 260);\n  --wiki-type-fragment-border:oklch(0.660 0.030 260);\n\n  /* Fragment types — same ramp, different hues */\n  --fragment-type-fact-bg:       oklch(0.955 0.035 225);\n  --fragment-type-fact-text:     oklch(0.340 0.180 225);\n  --fragment-type-fact-border:   oklch(0.660 0.150 225);\n  --fragment-type-question-bg:   oklch(0.955 0.035 300);\n  --fragment-type-question-text: oklch(0.340 0.180 300);\n  --fragment-type-question-border:oklch(0.660 0.150 300);\n  --fragment-type-idea-bg:       oklch(0.955 0.035 90);\n  --fragment-type-idea-text:     oklch(0.360 0.170 85);\n  --fragment-type-idea-border:   oklch(0.660 0.150 90);\n  --fragment-type-action-bg:     oklch(0.955 0.035 150);\n  --fragment-type-action-text:   oklch(0.340 0.180 150);\n  --fragment-type-action-border: oklch(0.660 0.150 150);\n  --fragment-type-quote-bg:      oklch(0.955 0.035 275);\n  --fragment-type-quote-text:    oklch(0.340 0.180 275);\n  --fragment-type-quote-border:  oklch(0.660 0.150 275);\n  --fragment-type-reference-bg:  oklch(0.955 0.035 185);\n  --fragment-type-reference-text:oklch(0.340 0.180 185);\n  --fragment-type-reference-border:oklch(0.660 0.150 185);\n\n  /* shadcn base */\n  --background: oklch(1 0 0);\n  --foreground: oklch(0.145 0 0);\n  --card: oklch(1 0 0);\n  --card-foreground: oklch(0.145 0 0);\n  --popover: oklch(1 0 0);\n  --popover-foreground: oklch(0.145 0 0);\n  --primary: var(--accent-500);\n  --primary-foreground: var(--accent-fg);\n  --secondary: oklch(0.97 0 0);\n  --secondary-foreground: oklch(0.205 0 0);\n  --muted: oklch(0.97 0 0);\n  --muted-foreground: oklch(0.556 0 0);\n  --accent: oklch(0.97 0 0);\n  --accent-foreground: oklch(0.205 0 0);\n  --destructive: oklch(0.577 0.245 27.325);\n  --border: oklch(0.922 0 0);\n  --input: oklch(0.922 0 0);\n  --ring: var(--accent-500);\n  --radius: 0.625rem;\n  --radius-sm: calc(var(--radius) * 0.6);\n  --radius-md: calc(var(--radius) * 0.8);\n  --radius-lg: var(--radius);\n  --radius-xl: calc(var(--radius) * 1.4);\n  --radius-2xl: calc(var(--radius) * 1.8);\n  --radius-3xl: calc(var(--radius) * 2.2);\n  --radius-4xl: calc(var(--radius) * 2.6);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; }\nbody {\n  background: var(--page-bg);\n  color: var(--heading-color);\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-size: 14px;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.font-serif { font-family: \"STIX Two Text\", serif; }\n.font-sans  { font-family: \"IBM Plex Sans\", sans-serif; }\n.font-plex  { font-family: \"IBM Plex Sans\", sans-serif; }\n.font-mono  { font-family: \"IBM Plex Mono\", ui-monospace, monospace; }\n\n/* ───────────────────────────────────────────────────────\n   Layout\n   ─────────────────────────────────────────────────────── */\n.shell {\n  max-width: 1280px;\n  margin: 0 auto;\n  padding: 72px 48px 120px;\n}\n@media (max-width: 720px) {\n  .shell { padding: 40px 20px 80px; }\n}\n\n.masthead {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: end;\n  gap: 32px;\n  padding-bottom: 28px;\n  border-bottom: 1px solid var(--wiki-meta-line);\n  margin-bottom: 56px;\n}\n.masthead__title {\n  font-family: \"STIX Two Text\", serif;\n  font-weight: 400;\n  font-size: 52px;\n  line-height: 1.05;\n  letter-spacing: -0.01em;\n  color: var(--wiki-title);\n  margin: 0 0 8px;\n}\n.masthead__sub {\n  color: var(--heading-secondary);\n  font-size: 15px;\n  max-width: 60ch;\n}\n.masthead__meta {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--wiki-count);\n  text-align: right;\n}\n.masthead__meta div + div { margin-top: 2px; }\n\n.section { margin-top: 72px; }\n.section:first-of-type { margin-top: 0; }\n.section__head {\n  display: flex;\n  align-items: baseline;\n  gap: 16px;\n  padding-bottom: 12px;\n  border-bottom: 1px solid var(--wiki-meta-line);\n  margin-bottom: 28px;\n}\n.section__index {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 12px;\n  color: var(--wiki-count);\n  letter-spacing: 0.06em;\n}\n.section__title {\n  font-family: \"STIX Two Text\", serif;\n  font-weight: 400;\n  font-size: 28px;\n  color: var(--wiki-title);\n  margin: 0;\n}\n.section__desc {\n  color: var(--heading-secondary);\n  font-size: 14px;\n  margin-left: auto;\n  max-width: 42ch;\n  text-align: right;\n}\n@media (max-width: 720px) {\n  .section__desc { display: none; }\n}\n\n.sub {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.09em;\n  color: var(--wiki-count);\n  margin: 24px 0 12px;\n}\n\n.grid { display: grid; gap: 16px; }\n.grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }\n.grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }\n.grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }\n.grid-6 { grid-template-columns: repeat(6, minmax(0,1fr)); }\n@media (max-width: 900px) {\n  .grid-3, .grid-4, .grid-6 { grid-template-columns: repeat(2, minmax(0,1fr)); }\n}\n@media (max-width: 520px) {\n  .grid-2, .grid-3, .grid-4, .grid-6 { grid-template-columns: 1fr; }\n}\n\n/* ───────────────────────────────────────────────────────\n   Specimen card — the generic container for every sample\n   ─────────────────────────────────────────────────────── */\n.spec {\n  border: 1px solid rgba(0,0,0,0.08);\n  border-radius: 2px;\n  background: #ffffff;\n  overflow: hidden;\n}\n.spec__body {\n  padding: 24px;\n  min-height: 120px;\n  display: flex;\n  align-items: center;\n  justify-content: flex-start;\n  flex-wrap: wrap;\n  gap: 10px;\n}\n.spec__body--center { justify-content: center; }\n.spec__body--col { flex-direction: column; align-items: stretch; }\n.spec__foot {\n  border-top: 1px solid rgba(0,0,0,0.06);\n  padding: 10px 14px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  gap: 12px;\n  background: #fafafa;\n}\n.spec__name {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  color: #202122;\n}\n.spec__token {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 10.5px;\n  color: var(--wiki-count);\n  text-align: right;\n}\n\n/* ───────────────────────────────────────────────────────\n   Color swatches\n   ─────────────────────────────────────────────────────── */\n.swatch {\n  background: #fff;\n  border: 1px solid rgba(0,0,0,0.08);\n  border-radius: 2px;\n  overflow: hidden;\n}\n.swatch__chip {\n  height: 96px;\n  border-bottom: 1px solid rgba(0,0,0,0.06);\n}\n.swatch__meta {\n  padding: 10px 12px;\n}\n.swatch__name {\n  font-size: 12px;\n  color: #202122;\n  font-weight: 500;\n}\n.swatch__var,\n.swatch__hex {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 10.5px;\n  color: var(--wiki-count);\n  display: block;\n  margin-top: 2px;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n}\n\n/* checkerboard for translucent swatches */\n.check {\n  background-image:\n    linear-gradient(45deg, #eee 25%, transparent 25%),\n    linear-gradient(-45deg, #eee 25%, transparent 25%),\n    linear-gradient(45deg, transparent 75%, #eee 75%),\n    linear-gradient(-45deg, transparent 75%, #eee 75%);\n  background-size: 12px 12px;\n  background-position: 0 0, 0 6px, 6px -6px, -6px 0;\n}\n\n/* ───────────────────────────────────────────────────────\n   Typography\n   ─────────────────────────────────────────────────────── */\n.type {\n  display: grid;\n  grid-template-columns: 180px 1fr auto;\n  align-items: baseline;\n  gap: 24px;\n  padding: 18px 0;\n  border-bottom: 1px solid rgba(0,0,0,0.06);\n}\n.type:last-child { border-bottom: none; }\n.type__label {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  color: var(--wiki-count);\n  text-transform: uppercase;\n  letter-spacing: 0.07em;\n}\n.type__sample { color: var(--wiki-title); }\n.type__spec {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 10.5px;\n  color: var(--wiki-count);\n  text-align: right;\n  white-space: nowrap;\n}\n@media (max-width: 720px) {\n  .type { grid-template-columns: 1fr; gap: 6px; }\n  .type__spec { text-align: left; }\n}\n\n/* ───────────────────────────────────────────────────────\n   Radii & shadows\n   ─────────────────────────────────────────────────────── */\n.radius-box {\n  height: 96px;\n  background:\n    repeating-linear-gradient(45deg, #f1f3f5 0 6px, transparent 6px 12px),\n    #fff;\n  border: 1px solid rgba(0,0,0,0.08);\n}\n\n/* ───────────────────────────────────────────────────────\n   Buttons — mirrors ui/button.tsx\n   ─────────────────────────────────────────────────────── */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 6px;\n  height: 32px;\n  padding: 0 10px;\n  border-radius: 2px;\n  border: 1px solid transparent;\n  background: transparent;\n  font-family: inherit;\n  font-size: 14px;\n  font-weight: 500;\n  line-height: 1;\n  cursor: pointer;\n  transition: background 120ms, color 120ms, border-color 120ms;\n  white-space: nowrap;\n}\n.btn:active:not([aria-haspopup]) { transform: translateY(1px); }\n.btn[disabled] { opacity: .5; cursor: not-allowed; }\n.btn svg { width: 16px; height: 16px; }\n\n.btn--default { background: var(--primary); color: var(--primary-foreground); }\n.btn--default:hover { background: var(--accent-hover); }\n.btn--outline { background: #fff; color: var(--foreground); border-color: var(--border); }\n.btn--outline:hover { background: var(--muted); }\n.btn--secondary { background: var(--secondary); color: var(--secondary-foreground); }\n.btn--secondary:hover { background: oklch(0.97 0 0 / .8); }\n.btn--ghost { color: var(--foreground); }\n.btn--ghost:hover { background: var(--muted); }\n.btn--destructive { background: rgb(255 56 56 / .10); color: #c1121f; }\n.btn--destructive:hover { background: rgb(255 56 56 / .18); }\n.btn--link { color: var(--primary); text-decoration-line: underline; text-underline-offset: 4px; }\n.btn--link:hover { text-decoration: underline; }\n\n/* brand tone — ActionButton */\n.btn--brand {\n  background: #3366cc;\n  color: #fff;\n  border-radius: 0;\n}\n.btn--brand:hover { background: var(--accent-hover); }\n.btn--brand[disabled] { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); opacity: 1; }\n\n.btn--xs { height: 24px; padding: 0 8px; font-size: 12px; border-radius: 2px; gap: 4px; }\n.btn--sm { height: 28px; padding: 0 10px; font-size: 13px; border-radius: 2px; }\n.btn--lg { height: 36px; padding: 0 12px; }\n.btn--icon { width: 32px; padding: 0; }\n.btn--icon-sm { width: 28px; height: 28px; padding: 0; border-radius: 2px; }\n.btn--icon-xs { width: 24px; height: 24px; padding: 0; border-radius: 2px; }\n\n/* ───────────────────────────────────────────────────────\n   Badges — mirrors ui/badge.tsx + wiki type/fragment badges\n   ─────────────────────────────────────────────────────── */\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  height: 20px;\n  padding: 0 8px;\n  border-radius: 9999px;\n  font-size: 12px;\n  font-weight: 500;\n  line-height: 1;\n  border: 1px solid transparent;\n  white-space: nowrap;\n}\n.badge--default { background: var(--primary); color: var(--primary-foreground); }\n.badge--secondary { background: var(--secondary); color: var(--secondary-foreground); }\n.badge--destructive { background: rgb(255 56 56 / .10); color: #c1121f; }\n.badge--outline { border-color: var(--border); color: var(--foreground); }\n.badge--ghost { color: var(--muted-foreground); }\n\n/* Wiki type pills — low radius, tight border */\n.tbadge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  height: 22px;\n  padding: 0 8px;\n  border-radius: 2px;\n  font-size: 11px;\n  font-weight: 500;\n  line-height: 1;\n  border: 1px solid;\n  font-family: \"IBM Plex Sans\", sans-serif;\n  letter-spacing: 0.01em;\n}\n.tbadge--log       { background: var(--wiki-type-log-bg);        color: var(--wiki-type-log-text);        border-color: var(--wiki-type-log-border); }\n.tbadge--research  { background: var(--wiki-type-research-bg);   color: var(--wiki-type-research-text);   border-color: var(--wiki-type-research-border); }\n.tbadge--belief    { background: var(--wiki-type-belief-bg);     color: var(--wiki-type-belief-text);     border-color: var(--wiki-type-belief-border); }\n.tbadge--decision  { background: var(--wiki-type-decision-bg);   color: var(--wiki-type-decision-text);   border-color: var(--wiki-type-decision-border); }\n.tbadge--project   { background: var(--wiki-type-project-bg);    color: var(--wiki-type-project-text);    border-color: var(--wiki-type-project-border); }\n.tbadge--objective { background: var(--wiki-type-objective-bg);  color: var(--wiki-type-objective-text);  border-color: var(--wiki-type-objective-border); }\n.tbadge--skill     { background: var(--wiki-type-skill-bg);      color: var(--wiki-type-skill-text);      border-color: var(--wiki-type-skill-border); }\n.tbadge--agent     { background: var(--wiki-type-agent-bg);      color: var(--wiki-type-agent-text);      border-color: var(--wiki-type-agent-border); }\n.tbadge--voice     { background: var(--wiki-type-voice-bg);      color: var(--wiki-type-voice-text);      border-color: var(--wiki-type-voice-border); }\n.tbadge--principles{ background: var(--wiki-type-principles-bg); color: var(--wiki-type-principles-text); border-color: var(--wiki-type-principles-border); }\n.tbadge--people    { background: var(--wiki-type-people-bg);     color: var(--wiki-type-people-text);     border-color: var(--wiki-type-people-border); }\n.tbadge--entry     { background: var(--wiki-type-entry-bg);      color: var(--wiki-type-entry-text);      border-color: var(--wiki-type-entry-border); }\n.tbadge--fragment  { background: var(--wiki-type-fragment-bg);   color: var(--wiki-type-fragment-text);   border-color: var(--wiki-type-fragment-border); }\n\n.fbadge--fact      { background: var(--fragment-type-fact-bg);      color: var(--fragment-type-fact-text);      border-color: var(--fragment-type-fact-border); }\n.fbadge--question  { background: var(--fragment-type-question-bg);  color: var(--fragment-type-question-text);  border-color: var(--fragment-type-question-border); }\n.fbadge--idea      { background: var(--fragment-type-idea-bg);      color: var(--fragment-type-idea-text);      border-color: var(--fragment-type-idea-border); }\n.fbadge--action    { background: var(--fragment-type-action-bg);    color: var(--fragment-type-action-text);    border-color: var(--fragment-type-action-border); }\n.fbadge--quote     { background: var(--fragment-type-quote-bg);     color: var(--fragment-type-quote-text);     border-color: var(--fragment-type-quote-border); }\n.fbadge--reference { background: var(--fragment-type-reference-bg); color: var(--fragment-type-reference-text); border-color: var(--fragment-type-reference-border); }\n\n/* ───────────────────────────────────────────────────────\n   Inputs\n   ─────────────────────────────────────────────────────── */\n.field { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 320px; }\n.field__label { font-size: 13px; font-weight: 500; color: var(--input-label); }\n.input {\n  height: 32px;\n  width: 100%;\n  padding: 4px 10px;\n  border-radius: 2px;\n  border: 1px solid var(--input);\n  background: transparent;\n  font: inherit;\n  color: inherit;\n  outline: none;\n  transition: border-color 120ms, box-shadow 120ms;\n}\n.input::placeholder { color: var(--muted-foreground); }\n.input:focus-visible { border-color: var(--ring); box-shadow: 0 0 0 3px var(--accent-ring); }\n.input[aria-invalid=\"true\"] { border-color: var(--destructive); box-shadow: 0 0 0 3px rgb(239 68 68 / .2); }\n.input:disabled { opacity: .5; background: oklch(0.922 0 0 / .5); cursor: not-allowed; }\n\n.textarea {\n  min-height: 80px;\n  padding: 8px 10px;\n  border-radius: 2px;\n  border: 1px solid var(--input);\n  width: 100%;\n  font: inherit;\n  resize: vertical;\n  background: transparent;\n  outline: none;\n}\n.textarea:focus-visible { border-color: var(--ring); box-shadow: 0 0 0 3px var(--accent-ring); }\n\n/* Input group */\n.igroup {\n  display: flex;\n  align-items: center;\n  height: 32px;\n  border-radius: 2px;\n  border: 1px solid var(--input);\n  overflow: hidden;\n  max-width: 360px;\n  background: #fff;\n}\n.igroup:focus-within { border-color: var(--ring); box-shadow: 0 0 0 3px var(--accent-ring); }\n.igroup__addon {\n  display: flex;\n  align-items: center;\n  gap: 4px;\n  color: var(--muted-foreground);\n  padding: 0 8px;\n  font-size: 13px;\n}\n.igroup__addon svg { width: 16px; height: 16px; }\n.igroup__input {\n  flex: 1;\n  border: none;\n  outline: none;\n  background: transparent;\n  height: 100%;\n  font: inherit;\n  padding: 0 8px;\n}\n\n/* Switch */\n.switch {\n  position: relative;\n  display: inline-flex;\n  align-items: center;\n  width: 32px;\n  height: 18px;\n  border-radius: 9999px;\n  background: var(--input);\n  cursor: pointer;\n  transition: background 120ms;\n  border: none;\n  padding: 0;\n  flex-shrink: 0;\n}\n.switch::after {\n  content: \"\";\n  position: absolute;\n  left: 1px; top: 1px;\n  width: 16px; height: 16px;\n  background: #fff;\n  border-radius: 9999px;\n  transition: transform 120ms;\n}\n.switch[aria-checked=\"true\"] { background: var(--primary); }\n.switch[aria-checked=\"true\"]::after { transform: translateX(14px); }\n.switch--sm { width: 24px; height: 14px; }\n.switch--sm::after { width: 12px; height: 12px; }\n.switch--sm[aria-checked=\"true\"]::after { transform: translateX(10px); }\n\n/* Avatar */\n.avatar {\n  width: 32px; height: 32px;\n  border-radius: 9999px;\n  background: var(--muted);\n  color: var(--muted-foreground);\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 14px;\n  position: relative;\n  flex-shrink: 0;\n  box-shadow: inset 0 0 0 1px var(--border);\n}\n.avatar--sm { width: 24px; height: 24px; font-size: 12px; }\n.avatar--lg { width: 40px; height: 40px; font-size: 16px; }\n.avatar__badge {\n  position: absolute;\n  right: 0; bottom: 0;\n  width: 10px; height: 10px;\n  border-radius: 9999px;\n  background: var(--primary);\n  box-shadow: 0 0 0 2px #fff;\n}\n.avatar-group { display: inline-flex; }\n.avatar-group > .avatar { margin-left: -8px; box-shadow: inset 0 0 0 1px var(--border), 0 0 0 2px #fff; }\n.avatar-group > .avatar:first-child { margin-left: 0; }\n\n/* Card — mirrors ui/card.tsx */\n.card {\n  display: flex; flex-direction: column; gap: 16px;\n  padding: 16px 0;\n  border-radius: 2px;\n  background: #fff;\n  box-shadow: 0 0 0 1px rgb(0 0 0 / .10);\n  overflow: hidden;\n}\n.card__header { padding: 0 16px; display: grid; gap: 4px; }\n.card__title {\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-size: 15px;\n  font-weight: 500;\n  line-height: 1.35;\n  color: var(--foreground);\n}\n.card__desc { font-size: 13px; color: var(--muted-foreground); }\n.card__content { padding: 0 16px; font-size: 13px; color: var(--foreground); }\n.card__footer {\n  display: flex; align-items: center;\n  gap: 8px;\n  padding: 16px;\n  border-top: 1px solid var(--border);\n  background: oklch(0.97 0 0 / .5);\n  margin: 0 0 -16px 0;\n}\n\n/* Wiki article card — used on explorer/search pages */\n.wiki-card {\n  border: 1px solid var(--wiki-card-border);\n  background: #fff;\n  padding: 14px 16px;\n}\n.wiki-card__title { color: var(--wiki-link); font-weight: 600; font-size: 14px; }\n.wiki-card__meta { color: var(--wiki-count); font-size: 12px; margin-top: 4px; }\n\n/* Dialog — squared to match wiki chrome */\n.dialog {\n  background: #fff;\n  border-radius: 2px;\n  box-shadow: 0 0 0 1px rgb(0 0 0 / .10), 0 20px 40px -10px rgb(0 0 0 / .25);\n  padding: 0;\n  width: 100%;\n  max-width: 440px;\n  display: flex;\n  flex-direction: column;\n  overflow: hidden;\n}\n.dialog__body {\n  padding: 20px 20px 16px;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.dialog__title { font-family: \"STIX Two Text\", serif; font-size: 20px; font-weight: 600; line-height: 1.2; color: var(--wiki-title); }\n.dialog__desc { font-size: 13px; color: var(--wiki-article-text); line-height: 1.5; }\n.dialog__footer {\n  display: flex;\n  justify-content: flex-end;\n  gap: 8px;\n  padding: 12px 16px;\n  border-top: 1px solid var(--border);\n  background: #fafafa;\n}\n\n/* Chip (combobox chip) */\n.chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  height: 21px;\n  padding: 0 6px;\n  border-radius: 2px;\n  background: var(--muted);\n  font-size: 12px;\n  font-weight: 500;\n  color: var(--foreground);\n}\n.chip__x {\n  width: 14px; height: 14px;\n  opacity: .5;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  cursor: pointer;\n  border-radius: 2px;\n}\n.chip__x:hover { opacity: 1; background: rgb(0 0 0 / .06); }\n\n/* Wiki chip (link pill) — used for people/tag chips in articles */\n.wchip {\n  display: inline-flex;\n  align-items: center;\n  height: 22px;\n  padding: 0 8px;\n  border-radius: 2px;\n  font-size: 12px;\n  background: var(--wiki-chip-bg);\n  color: var(--wiki-chip-text);\n  border: 1px solid var(--wiki-chip-border);\n}\n\n/* Search filter chip — ghost by default, fill on active */\n.sfchip {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 3px 10px;\n  background: transparent;\n  border: 1px solid var(--wiki-card-border);\n  border-radius: 2px;\n  color: var(--wiki-sidebar-text);\n  font-size: 12px;\n  cursor: pointer;\n}\n.sfchip:hover { background: var(--accent-100); color: var(--accent-700); border-color: var(--accent-300); }\n.sfchip--active { background: var(--accent-500); color: var(--accent-fg); border-color: var(--accent-500); }\n\n/* Wiki article tab */\n.atab {\n  display: inline-flex;\n  align-items: center;\n  padding: 4px 0;\n  color: var(--wiki-link);\n  font-size: 13px;\n  border-bottom: 2px solid transparent;\n  margin-right: 20px;\n}\n.atab:hover { border-bottom-color: var(--accent-200); color: var(--accent-700); }\n.atab--active { color: var(--accent-600); border-bottom-color: var(--accent-500); }\n\n/* Spinner */\n.spinner {\n  width: 16px; height: 16px;\n  border-radius: 50%;\n  border: 2px solid rgba(0,0,0,.15);\n  border-top-color: #000;\n  animation: spin .8s linear infinite;\n  display: inline-block;\n}\n@keyframes spin { to { transform: rotate(360deg); } }\n\n/* Callout */\n.note {\n  display: flex; gap: 12px;\n  padding: 12px 14px;\n  border-left: 3px solid var(--wiki-link);\n  background: #f4f7fd;\n  font-size: 13px;\n  color: var(--wiki-article-text);\n  margin-top: 12px;\n}\n.note strong { color: #000; }\n\n/* Search input pattern */\n.search {\n  position: relative;\n  width: 100%;\n  max-width: 360px;\n}\n.search input {\n  height: 32px;\n  width: 100%;\n  padding: 0 10px 0 32px;\n  border-radius: 2px;\n  border: 1px solid var(--wiki-search-border);\n  font: inherit;\n  background: #fff;\n  outline: none;\n}\n.search input::placeholder { color: var(--wiki-search-placeholder); }\n.search svg {\n  position: absolute; left: 10px; top: 50%;\n  transform: translateY(-50%);\n  width: 14px; height: 14px;\n  color: var(--wiki-count);\n}\n\n.hint {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  color: var(--wiki-count);\n  margin-top: -8px;\n  margin-bottom: 16px;\n}\n\n/* ───────────────────────────────────────────────────────\n   Wiki furniture — TOC, [edit], citations, external links\n   ─────────────────────────────────────────────────────── */\n/* Article heading with edit affordance */\n.wh2, .wh3 {\n  font-family: \"STIX Two Text\", serif;\n  color: var(--wiki-article-h2);\n  font-weight: 600;\n  display: flex;\n  align-items: baseline;\n  gap: 10px;\n}\n.wh2 { font-size: 26px; margin: 32px 0 0; padding-bottom: 6px; border-bottom: 1px solid var(--wiki-meta-line); }\n.wh3 { font-size: 19px; margin: 20px 0 8px; }\n.wh2 + p, .wh3 + p { margin-top: 12px; }\n.wedit {\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-weight: 400;\n  font-size: 12px;\n  color: var(--wiki-count);\n  text-decoration: none;\n  letter-spacing: 0;\n}\n.wedit::before { content: \"[\"; }\n.wedit::after  { content: \"]\"; }\n.wedit:hover   { color: var(--accent-700); }\n\n/* Citations — superscript [1] style */\nsup.cite {\n  font-size: 11px;\n  line-height: 0;\n  vertical-align: super;\n  margin-left: 1px;\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-weight: 400;\n}\nsup.cite a { color: var(--wiki-link); text-decoration: none; }\nsup.cite a::before { content: \"[\"; }\nsup.cite a::after  { content: \"]\"; }\nsup.cite a:hover { text-decoration: underline; }\n\n/* External link arrow */\na.ext::after {\n  content: \"↗\";\n  font-size: 0.85em;\n  margin-left: 2px;\n  display: inline-block;\n  color: var(--wiki-count);\n  text-decoration: none;\n}\na.ext:hover::after { color: var(--accent-700); }\n\n/* Floating TOC (table of contents) */\n.wtoc {\n  border: 1px solid var(--wiki-toc-border);\n  background: #f8f9fa;\n  padding: 10px 14px 12px;\n  font-size: 13px;\n  color: var(--wiki-article-text);\n  min-width: 240px;\n}\n.wtoc__title {\n  font-family: \"STIX Two Text\", serif;\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--wiki-title);\n  padding-bottom: 6px;\n  margin-bottom: 6px;\n  border-bottom: 1px solid var(--wiki-meta-line);\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n}\n.wtoc__toggle {\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-weight: 400;\n  font-size: 11px;\n  color: var(--wiki-count);\n  text-decoration: none;\n  text-transform: lowercase;\n  letter-spacing: 0;\n}\n.wtoc__toggle:hover { color: var(--accent-700); }\n.wtoc ol { margin: 0; padding: 0; list-style: none; counter-reset: toc; }\n.wtoc ol > li { counter-increment: toc; padding: 2px 0; }\n.wtoc ol > li::before {\n  content: counters(toc, \".\") \"\\a0\\a0\";\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 12px;\n  color: var(--wiki-count);\n}\n.wtoc ol ol { padding-left: 18px; counter-reset: toc; }\n.wtoc a { color: var(--wiki-link); text-decoration: none; }\n.wtoc a:hover { text-decoration: underline; }\n\n/* Infobox — Wikipedia-style, tinted header, two-tone cells */\n.winfo {\n  border: 1px solid var(--wiki-nav-border);\n  background: #fff;\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-size: 13px;\n  color: var(--wiki-article-text);\n  width: 100%;\n  border-collapse: collapse;\n}\n.winfo__head {\n  font-family: \"STIX Two Text\", serif;\n  font-size: 16px;\n  font-weight: 600;\n  color: var(--wiki-title);\n  padding: 10px 12px;\n  background: var(--accent-100);\n  border-bottom: 1px solid var(--wiki-nav-border);\n  text-align: center;\n}\n.winfo__image {\n  padding: 10px;\n  background: #f8f9fa;\n  text-align: center;\n  border-bottom: 1px solid var(--wiki-meta-line);\n}\n.winfo__caption {\n  padding: 6px 12px 10px;\n  background: #f8f9fa;\n  font-size: 11px;\n  font-style: italic;\n  color: var(--wiki-count);\n  text-align: center;\n  border-bottom: 1px solid var(--wiki-meta-line);\n}\n.winfo__section {\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-weight: 600;\n  font-size: 12px;\n  color: var(--wiki-title);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  padding: 8px 12px 6px;\n  background: #f8f9fa;\n  border-top: 1px solid var(--wiki-meta-line);\n  border-bottom: 1px solid var(--wiki-meta-line);\n  text-align: center;\n}\n.winfo__row { display: grid; grid-template-columns: 95px 1fr; }\n.winfo__row > .winfo__k,\n.winfo__row > .winfo__v {\n  padding: 6px 10px;\n  border-bottom: 1px solid var(--wiki-meta-line);\n  font-size: 12px;\n  line-height: 1.4;\n}\n.winfo__k {\n  background: #f8f9fa;\n  font-weight: 600;\n  color: var(--wiki-title);\n  border-right: 1px solid var(--wiki-meta-line);\n}\n.winfo__v { color: var(--wiki-article-text); }\n.winfo__row:last-child > .winfo__k,\n.winfo__row:last-child > .winfo__v { border-bottom: 0; }\n\n/* References list — numbered [1] entries with back-ref ^ */\n.wrefs {\n  list-style: none;\n  margin: 10px 0 0;\n  padding: 0;\n  counter-reset: ref;\n  font-size: 13px;\n  color: var(--wiki-article-text);\n  line-height: 1.55;\n}\n.wrefs li {\n  counter-increment: ref;\n  display: grid;\n  grid-template-columns: 32px 1fr;\n  padding: 4px 0;\n}\n.wrefs li::before {\n  content: counter(ref) \".\";\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 12px;\n  color: var(--wiki-count);\n  padding-top: 1px;\n}\n.wrefs__back {\n  color: var(--wiki-link);\n  text-decoration: none;\n  margin-right: 6px;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 12px;\n}\n.wrefs__back:hover { text-decoration: underline; }\n\n/* See-also column list */\n.wsee {\n  list-style: none;\n  margin: 8px 0 0;\n  padding: 0;\n  column-count: 2;\n  column-gap: 32px;\n  font-size: 14px;\n}\n.wsee li { padding: 2px 0; break-inside: avoid; }\n.wsee a { color: var(--wiki-link); text-decoration: none; }\n.wsee a:hover { text-decoration: underline; }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"shell\">\n\n<!-- Masthead -->\n<header class=\"masthead\">\n  <div>\n    <h1 class=\"masthead__title\">Robin Wiki — Design System<\u002Fh1>\n    <p class=\"masthead__sub\">Tokens, patterns and components synced from <span class=\"font-mono\" style=\"font-size:12px;\">@robin/wiki<\u002Fspan> — shadcn v4 on <span class=\"font-mono\" style=\"font-size:12px;\">@base-ui/react<\u002Fspan>, IBM Plex Sans + STIX Two Text, Tailwind v4.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"masthead__meta\">\n    <div>SYNCED FROM withrobinhq/robinwiki@main<\u002Fdiv>\n    <div>wiki/ · 155 FILES<\u002Fdiv>\n    <div>TAILWIND 4 · REACT 19 · NEXT 16<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ─────────────────────────────────────────────── 01 COLORS -->\n<section class=\"section\" id=\"colors\">\n  <div class=\"section__head\">\n    <span class=\"section__index\">01<\u002Fspan>\n    <h2 class=\"section__title\">Colors<\u002Fh2>\n    <p class=\"section__desc\">Two palettes live side-by-side: a neutral shadcn base (oklch) and the Robin-specific <span class=\"font-mono\" style=\"font-size:12px\">--wiki-*<\u002Fspan> tokens that drive the article + sidebar chrome.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"sub\">Surfaces &amp; text<\u002Fdiv>\n  <div class=\"grid grid-4\">\n    <!-- background -->\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--page-bg);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Page background<\u002Fdiv>\n        <span class=\"swatch__var\">body<\u002Fspan>\n        <span class=\"swatch__hex\">#f8f9fa<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--bg);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Onboarding bg<\u002Fdiv>\n        <span class=\"swatch__var\">--bg<\u002Fspan>\n        <span class=\"swatch__hex\">#efefef<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--input-bg);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Input bg<\u002Fdiv>\n        <span class=\"swatch__var\">--input-bg<\u002Fspan>\n        <span class=\"swatch__hex\">#e6e6e6<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--heading-color);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Heading / ink<\u002Fdiv>\n        <span class=\"swatch__var\">--heading-color<\u002Fspan>\n        <span class=\"swatch__hex\">#000000<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--heading-secondary);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Heading secondary<\u002Fdiv>\n        <span class=\"swatch__var\">--heading-secondary<\u002Fspan>\n        <span class=\"swatch__hex\">#555555<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--section-label);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Section label<\u002Fdiv>\n        <span class=\"swatch__var\">--section-label<\u002Fspan>\n        <span class=\"swatch__hex\">#676d76<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--subtitle);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Subtitle<\u002Fdiv>\n        <span class=\"swatch__var\">--subtitle<\u002Fspan>\n        <span class=\"swatch__hex\">#898c90<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--helper-text);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Helper text<\u002Fdiv>\n        <span class=\"swatch__var\">--helper-text<\u002Fspan>\n        <span class=\"swatch__hex\">#6f6f6f<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sub\">Wiki chrome<\u002Fdiv>\n  <div class=\"grid grid-4\">\n    <div class=\"swatch\">\n      <div class=\"swatch__chip\" style=\"background: var(--wiki-link);\"><\u002Fdiv>\n      <div class=\"swatch__meta\">\n        <div class=\"swatch__name\">Link / accent<\u002Fdiv>\n        <span class=\"swatch__var\">--wiki-link<\u002   <span class=\"tbadge fbadge--action\">action<\u002Fspan>\n        <span class=\"tbadge fbadge--idea\">idea<\u002Fspan>\n        <span class=\"tbadge fbadge--quote\">quote<\u002Fspan>\n        <span class=\"tbadge fbadge--question\">question<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); display:flex; gap: 16px; flex-wrap:wrap; font-size: 12px; color: var(--helper-text);\">\n        <div><strong style=\"color:#111;\">Before<\u002Fstrong> — every badge a hand-picked hex, contrast varies, rainbow reads loud<\u002Fdiv>\n        <div><strong style=\"color:#111;\">After<\u002Fstrong> — one recipe, 17 hues, contrast is constant, family reads as a system<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec__foot\"><span class=\"spec__name\">tbadge · fbadge<\u002Fspan><span class=\"spec__token\">single OKLCH recipe, 17 hues<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────────────────────── 10 ARTICLE SAMPLE -->\n<section class=\"section\" id=\"article\">\n  <div class=\"section__head\">\n    <span class=\"section__index\">09<\u002Fspan>\n    <h2 class=\"section__title\">Sample wiki article<\u002Fh2>\n    <p class=\"section__desc\">Long-form article render using the actual typography stack — serif headings, IBM Plex Sans body, IBM Plex Mono for code. Stress-tests body copy at real reading length.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"background:#fff; border:1px solid var(--wiki-card-border); padding: 40px 48px 48px; max-width: 920px;\">\n    <!-- Breadcrumb -->\n    <div style=\"display:flex; gap:6px; align-items:center; font-size:12px; color: var(--wiki-count); margin-bottom: 10px;\">\n      <a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">Home<\u002Fa>\n      <span>›<\u002Fspan>\n      <a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">Research<\u002Fa>\n      <span>›<\u002Fspan>\n      <span>Transformers<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Title + tabs row -->\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:24px; padding-bottom: 12px; border-bottom: 1px solid var(--wiki-meta-line);\">\n      <h1 class=\"font-serif\" style=\"font-size: 36px; font-weight: 400; line-height: 1.15; color: var(--wiki-title); margin: 0;\">Transformers — architecture overview<\u002Fh1>\n      <div style=\"flex-shrink:0; display:flex;\">\n        <a class=\"atab atab--active\" href=\"#\">Read<\u002Fa>\n        <a class=\"atab\" href=\"#\">Edit<\u002Fa>\n        <a class=\"atab\" href=\"#\" style=\"margin-right:0;\">History<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Meta line -->\n    <div style=\"display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin: 10px 0 24px; font-size: 12px; color: var(--wiki-count);\">\n      <span class=\"tbadge tbadge--research\">Research<\u002Fspan>\n      <span>From <a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">Architecture overview<\u002Fa><\u002Fspan>\n      <span>·<\u002Fspan>\n      <span>Updated April 17, 2026 by <a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">Ada Lovelace<\u002Fa><\u002Fspan>\n      <span>·<\u002Fspan>\n      <span>12 fragments<\u002Fspan>\n      <span>·<\u002Fspan>\n      <span><a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">8 mentions<\u002Fa><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns: 1fr 300px; gap: 32px; align-items:start;\">\n      <!-- Main column -->\n      <article style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; line-height: 1.65; color: var(--wiki-article-text);\">\n        <!-- Lead paragraphs (before TOC, Wikipedia convention) -->\n        <p style=\"margin: 0 0 14px;\">A <strong>transformer<\u002Fstrong> is a deep learning architecture developed at Google Research, based on the multi-head attention mechanism.<sup class=\"cite\"><a href=\"#ref-1\" id=\"cite-1\">1<\u002Fa><\u002Fsup> Unlike recurrent networks, transformers process an entire sequence in parallel, relying on <em>self-attention<\u002Fem> to model relationships between tokens regardless of their distance.<\u002Fp>\n\n        <p style=\"margin: 0 0 14px;\">The original formulation — introduced in the 2017 paper <a class=\"ext\" href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">\"Attention Is All You Need\"<\u002Fa><sup class=\"cite\"><a href=\"#ref-2\" id=\"cite-2\">2<\u002Fa><\u002Fsup> — has since become the dominant substrate for language, vision, audio and multimodal models. Its influence stretches across nearly every <span class=\"wchip\">#ai<\u002Fspan> <span class=\"wchip\">#architecture<\u002Fspan> thread in this wiki.<\u002Fp>\n\n        <!-- TOC -->\n        <nav class=\"wtoc\" style=\"margin: 18px 0 24px;\">\n          <div class=\"wtoc__title\">\n            <span>Contents<\u002Fspan>\n            <a class=\"wtoc__toggle\" href=\"#\">hide<\u002Fa>\n          <\u002Fdiv>\n          <ol>\n            <li><a href=\"#core\">Core components<\u002Fa>\n              <ol>\n                <li><a href=\"#self-attn\">Self-attention<\u002Fa><\u002Fli>\n                <li><a href=\"#mha\">Multi-head attention<\u002Fa><\u002Fli>\n                <li><a href=\"#ff\">Feed-forward sub-layer<\u002Fa><\u002Fli>\n              <\u002Fol>\n            <\u002Fli>\n            <li><a href=\"#pos\">Positional information<\u002Fa><\u002Fli>\n            <li><a href=\"#scaling\">Scaling<\u002Fa><\u002Fli>\n            <li><a href=\"#open\">Open questions<\u002Fa><\u002Fli>\n            <li><a href=\"#see-also\">See also<\u002Fa><\u002Fli>\n            <li><a href=\"#refs\">References<\u002Fa><\u002Fli>\n          <\u002Fol>\n        <\u002Fnav>\n\n        <h2 id=\"core\" class=\"wh2\">Core components <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh2>\n        <p style=\"margin: 12px 0 14px;\">A standard transformer block is composed of three sub-layers: a multi-head self-attention module, a position-wise feed-forward network, and a set of residual connections interleaved with layer normalisation.<sup class=\"cite\"><a href=\"#ref-2\" id=\"cite-3\">2<\u002Fa><\u002Fsup> Each of these pieces earns its place through a distinct role.<\u002Fp>\n\n        <h3 id=\"self-attn\" class=\"wh3\">Self-attention <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh3>\n        <p style=\"margin: 0 0 14px;\">For each token in the input, self-attention produces three projections: a <em>query<\u002Fem>, a <em>key<\u002Fem>, and a <em>value<\u002Fem>. The query is compared against every key via a scaled dot product; the resulting similarities are normalised with a softmax and used as weights over the values. The output is therefore a content-addressable read of the sequence — tokens retrieve information from other tokens by semantic similarity rather than by position.<\u002Fp>\n        <p style=\"margin: 0 0 14px;\">In practice, the mechanism is parameterised as <span class=\"font-mono\" style=\"font-size:13px; background:#fafafa; border:1px solid var(--border); padding:1px 6px; border-radius:2px;\">softmax(QKᵀ / √d) · V<\u002Fspan>, where d is the per-head dimension. The scaling factor keeps gradients well-behaved as the head dimension grows.<sup class=\"cite\"><a href=\"#ref-2\" id=\"cite-4\">2<\u002Fa><\u002Fsup><\u002Fp>\n\n        <h3 id=\"mha\" class=\"wh3\">Multi-head attention <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh3>\n        <p style=\"margin: 0 0 14px;\">A single attention operation captures one kind of relationship. Transformers run many in parallel — typically 8 to 128 — on lower-dimensional projections, concatenate the results, and project them back to the model dimension. Different heads specialise implicitly: some track syntactic structure, others co-reference, others long-range semantic similarity.<sup class=\"cite\"><a href=\"#ref-3\" id=\"cite-5\">3<\u002Fa><\u002Fsup><\u002Fp>\n\n        <h3 id=\"ff\" class=\"wh3\">Feed-forward sub-layer <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh3>\n        <p style=\"margin: 0 0 14px;\">Between attention layers, each position is passed independently through a two-layer MLP, usually with a GELU or SwiGLU non-linearity and a 4× expansion ratio. This is where the bulk of a transformer's parameters live, and where most of the stored knowledge is thought to be encoded.<\u002Fp>\n\n        <h2 id=\"pos\" class=\"wh2\">Positional information <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh2>\n        <p style=\"margin: 12px 0 14px;\">Because self-attention is permutation-invariant, transformers need an explicit signal for token order. The original paper used fixed sinusoidal encodings added to the token embeddings. Modern systems more often use rotary (RoPE)<sup class=\"cite\"><a href=\"#ref-4\" id=\"cite-6\">4<\u002Fa><\u002Fsup> or ALiBi position embeddings, which generalise better to sequences longer than those seen at training time.<\u002Fp>\n\n        <blockquote style=\"margin: 16px 0; padding: 10px 16px; border-left: 3px solid var(--wiki-nav-border); color: #555; background: #fafbfc; font-family: 'STIX Two Text', serif; font-size: 16px; font-style: italic;\">\n          \"Attention is a mechanism that lets the model decide where to look. Position encodings remind it that <em>where<\u002Fem> means something.\"\n          <div style=\"font-family: 'IBM Plex Sans', sans-serif; font-style: normal; font-size: 12px; color: var(--wiki-count); margin-top: 6px;\">— Fragment 4.7, <a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">Vaswani notes<\u002Fa><\u002Fdiv>\n        <\u002Fblockquote>\n\n        <h2 id=\"scaling\" class=\"wh2\">Scaling <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh2>\n        <p style=\"margin: 12px 0 14px;\">Transformers scale predictably. Doubling parameters, tokens, or compute produces a power-law improvement in loss, captured by the Chinchilla scaling laws.<sup class=\"cite\"><a href=\"#ref-5\" id=\"cite-7\">5<\u002Fa><\u002Fsup> This predictability — rare in deep learning — is part of why transformers displaced prior architectures so quickly: you can forecast the return on a training run before committing to it.<\u002Fp>\n\n        <ul style=\"margin: 0 0 14px 22px; padding: 0;\">\n          <li style=\"margin: 0 0 4px;\"><strong>Parameters.<\u002Fstrong> Current frontier models sit in the trillions, routed sparsely via mixtures of experts.<\u002Fli>\n          <li style=\"margin: 0 0 4px;\"><strong>Context.<\u002Fstrong> Linear, local, and state-space variants have pushed sequence length from 2K to beyond 1M tokens.<\u002Fli>\n          <li style=\"margin: 0 0 4px;\"><strong>Modalities.<\u002Fstrong> The same block works for text, images, audio, proteins and robot trajectories — the backbone has become substrate-agnostic.<\u002Fli>\n        <\u002Ful>\n\n        <h2 id=\"open\" class=\"wh2\">Open questions <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh2>\n        <p style=\"margin: 12px 0 14px;\">Despite their success, transformers leave several fundamental questions unanswered. Why is attention sufficient? What, exactly, do MLP layers store, and can it be edited cleanly? Why do optimisers that work on CNNs break on transformers without warmup and layer-norm placement tricks? Each of these anchors an active <span class=\"wchip\">#research<\u002Fspan> thread elsewhere in the wiki.<\u002Fp>\n\n        <!-- See also -->\n        <h2 id=\"see-also\" class=\"wh2\">See also <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh2>\n        <ul class=\"wsee\">\n          <li><a href=\"#\">Mixture of experts<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Linear attention<\u002Fa><\u002Fli>\n          <li><a href=\"#\">State-space models<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Recurrent neural networks<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Attention (machine learning)<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Large language model<\u002Fa><\u002Fli>\n        <\u002Ful>\n\n        <!-- References -->\n        <h2 id=\"refs\" class=\"wh2\">References <a class=\"wedit\" href=\"#\">edit<\u002Fa><\u002Fh2>\n        <ol class=\"wrefs\">\n          <li id=\"ref-1\"><div><a class=\"wrefs__back\" href=\"#cite-1\">^<\u002Fa> Bahdanau, D.; Cho, K.; Bengio, Y. (2014). <em>Neural Machine Translation by Jointly Learning to Align and Translate<\u002Fem>. <a class=\"ext\" href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">arXiv:1409.0473<\u002Fa>.<\u002Fdiv><\u002Fli>\n          <li id=\"ref-2\"><div><a class=\"wrefs__back\" href=\"#cite-2\">^<\u002Fa> Vaswani, A. et&nbsp;al. (2017). <em>Attention Is All You Need<\u002Fem>. Advances in Neural Information Processing Systems 30. <a class=\"ext\" href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">arXiv:1706.03762<\u002Fa>.<\u002Fdiv><\u002Fli>\n          <li id=\"ref-3\"><div><a class=\"wrefs__back\" href=\"#cite-5\">^<\u002Fa> Clark, K.; Khandelwal, U.; Levy, O.; Manning, C. D. (2019). <em>What Does BERT Look At? An Analysis of BERT's Attention<\u002Fem>. ACL Workshop BlackboxNLP.<\u002Fdiv><\u002Fli>\n          <li id=\"ref-4\"><div><a class=\"wrefs__back\" href=\"#cite-6\">^<\u002Fa> Su, J. et&nbsp;al. (2021). <em>RoFormer: Enhanced Transformer with Rotary Position Embedding<\u002Fem>. <a class=\"ext\" href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">arXiv:2104.09864<\u002Fa>.<\u002Fdiv><\u002Fli>\n          <li id=\"ref-5\"><div><a class=\"wrefs__back\" href=\"#cite-7\">^<\u002Fa> Hoffmann, J. et&nbsp;al. (2022). <em>Training Compute-Optimal Large Language Models<\u002Fem> (Chinchilla). DeepMind. <a class=\"ext\" href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">arXiv:2203.15556<\u002Fa>.<\u002Fdiv><\u002Fli>\n        <\u002Fol>\n      <\u002Farticle>\n\n      <!-- Infobox — Wikipedia style -->\n      <aside>\n        <div class=\"winfo\">\n          <div class=\"winfo__head\">Transformer<\u002Fdiv>\n          <div class=\"winfo__image\" aria-label=\"Architecture diagram placeholder\">\n            <svg viewBox=\"0 0 240 170\" width=\"100%\" style=\"max-width: 240px;\" xmlns=\"http://www.w3.org/2000/svg\">\n              <rect x=\"0\" y=\"0\" width=\"240\" height=\"170\" fill=\"#f0f2f5\"><\u002Frect>\n              <!-- Encoder block -->\n              <g transform=\"translate(30 20)\">\n                <rect width=\"80\" height=\"130\" fill=\"#fff\" stroke=\"#a2a9b1\" stroke-width=\"1\"><\u002Frect>\n                <rect x=\"8\" y=\"10\" width=\"64\" height=\"18\" fill=\"var(--accent-100)\" stroke=\"var(--accent-300)\"><\u002Frect>\n                <rect x=\"8\" y=\"36\" width=\"64\" height=\"28\" fill=\"#fff\" stroke=\"#a2a9b1\"><\u002Frect>\n                <rect x=\"8\" y=\"72\" width=\"64\" height=\"18\" fill=\"var(--accent-100)\" stroke=\"var(--accent-300)\"><\u002Frect>\n                <rect x=\"8\" y=\"98\" width=\"64\" height=\"22\" fill=\"#fff\" stroke=\"#a2a9b1\"><\u002Frect>\n                <text x=\"40\" y=\"155\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" fill=\"#555\">ENCODER<\u002Ftext>\n              <\u002Fg>\n              <!-- Arrow -->\n              <g stroke=\"#555\" stroke-width=\"1.2\" fill=\"none\">\n                <path d=\"M 115 85 L 128 85\" marker-end=\"url(#ah)\"><\u002Fpath>\n              <\u002Fg>\n              <defs>\n                <marker id=\"ah\" markerWidth=\"6\" markerHeight=\"6\" refX=\"5\" refY=\"3\" orient=\"auto\">\n                  <path d=\"M0,0 L6,3 L0,6 z\" fill=\"#555\"><\u002Fpath>\n                <\u002Fmarker>\n              <\u002Fdefs>\n              <!-- Decoder block -->\n              <g transform=\"translate(130 20)\">\n                <rect width=\"80\" height=\"130\" fill=\"#fff\" stroke=\"#a2a9b1\" stroke-width=\"1\"><\u002Frect>\n                <rect x=\"8\" y=\"10\" width=\"64\" height=\"18\" fill=\"var(--accent-100)\" stroke=\"var(--accent-300)\"><\u002Frect>\n                <rect x=\"8\" y=\"36\" width=\"64\" height=\"18\" fill=\"var(--accent-100)\" stroke=\"var(--accent-300)\"><\u002Frect>\n                <rect x=\"8\" y=\"62\" width=\"64\" height=\"28\" fill=\"#fff\" stroke=\"#a2a9b1\"><\u002Frect>\n                <rect x=\"8\" y=\"98\" width=\"64\" height=\"22\" fill=\"#fff\" stroke=\"#a2a9b1\"><\u002Frect>\n                <text x=\"40\" y=\"155\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" fill=\"#555\">DECODER<\u002Ftext>\n              <\u002Fg>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"winfo__caption\">The original encoder–decoder transformer block (Vaswani et al., 2017).<\u002Fdiv>\n\n          <div class=\"winfo__section\">General<\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Introduced<\u002Fdiv><div class=\"winfo__v\">June 2017<\u002Fdiv><\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Paper<\u002Fdiv><div class=\"winfo__v\"><a class=\"ext\" href=\"#\" style=\"color: var(--wiki-link); text-decoration:none;\">Attention Is All You Need<\u002Fa><\u002Fdiv><\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Authors<\u002Fdiv><div class=\"winfo__v\">Vaswani et&nbsp;al.<br>(Google Brain)<\u002Fdiv><\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Field<\u002Fdiv><div class=\"winfo__v\">Deep learning<\u002Fdiv><\u002Fdiv>\n\n          <div class=\"winfo__section\">Applications<\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Modalities<\u002Fdiv><div class=\"winfo__v\">Text, vision, audio, biology, robotics<\u002Fdiv><\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Derivatives<\u002Fdiv><div class=\"winfo__v\">BERT, GPT, T5, ViT, Whisper, AlphaFold 2<\u002Fdiv><\u002Fdiv>\n\n          <div class=\"winfo__section\">In this wiki<\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Fragments<\u002Fdiv><div class=\"winfo__v\">12<\u002Fdiv><\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Mentions<\u002Fdiv><div class=\"winfo__v\">8 pages<\u002Fdiv><\u002Fdiv>\n          <div class=\"winfo__row\"><div class=\"winfo__k\">Related<\u002Fdiv><div class=\"winfo__v\" style=\"display:flex; flex-wrap:wrap; gap:4px;\">\n            <span class=\"tbadge tbadge--research\">Research<\u002Fspan>\n            <span class=\"tbadge fbadge--fact\">Fact<\u002Fspan>\n            <span class=\"tbadge fbadge--reference\">Reference<\u002Fspan>\n          <\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n\n    <!-- Article footer -->\n    <div style=\"margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--wiki-meta-line); display:flex; justify-content:space-between; font-size: 12px; color: var(--wiki-count); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em;\">\n      <div>CATEGORIES: <a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none; text-transform:none; letter-spacing:0;\">Machine learning<\u002Fa> · <a href=\"#\" style=\"color: var(--wiki-link); text-decoration:none; text-transform:none; letter-spacing:0;\">Neural networks<\u002Fa><\u002Fdiv>\n      <div>LAST EDIT 3d AGO<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────────────────────── 11 DESIGN REVIEW -->\n<section class=\"section\" id=\"review\">\n  <div class=\"section__head\">\n    <span class=\"section__index\">11<\u002Fspan>\n    <h2 class=\"section__title\">Design review notes<\u002Fh2>\n    <p class=\"section__desc\">Log of the color-and-contrast pass. Kept here so future iterations inherit the reasoning, not just the values.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"display:grid; grid-template-columns: 180px 1fr; gap: 0; border-top: 1px solid var(--border);\">\n\n    <!-- Row: date -->\n    <div style=\"padding: 20px 0; border-bottom: 1px solid var(--border); font: 500 11px/1.4 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--helper-text);\">\n      Apr 21, 2026<br>\n      <span style=\"color: var(--subtitle); text-transform:none; letter-spacing:0; font-weight:400;\">v0.1 → v0.2<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding: 20px 0 20px 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); padding-left: 24px;\">\n      <div class=\"font-serif\" style=\"font-size: 20px; font-weight: 600; color: var(--wiki-title); margin-bottom: 6px;\">Color system pass<\u002Fdiv>\n      <div style=\"font-size: 13px; color: var(--wiki-article-text);\">Four moves landed together: signature accent, unified badge ramp, semantic states, attempted paper tone. The set compounds — an identity hue only reads as identity when the noise around it (rainbow badges, accidental blues) is disciplined at the same time.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Row: Accent -->\n    <div style=\"padding: 20px 0; border-bottom: 1px solid var(--border); font: 500 11px/1.4 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--helper-text); display:flex; align-items:flex-start; gap:10px;\">\n      <span style=\"display:inline-block; width:10px; height:10px; background: var(--accent-500); margin-top:3px; flex-shrink:0;\"><\u002Fspan>\n      <span>01 · Accent<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding: 20px 0 20px 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); padding-left: 24px;\">\n      <div style=\"font: 600 14px/1.3 'STIX Two Text', serif; color: var(--wiki-title); margin-bottom: 6px;\">Promoted <span class=\"font-mono\" style=\"font-size:12px; font-weight:500;\">#3366cc<\u002Fspan> from wiki-link to signature accent<\u002Fdiv>\n      <div style=\"font-size: 13px; color: var(--wiki-article-text); margin-bottom: 10px;\">\n        Generated a 10-step OKLCH ramp (50–900) from the canonical hue (H 264, C 0.17, L 0.48). The 500 anchors primary buttons, focus rings, current-page markers, and links. The 100/200 tints cover hover states and chip backgrounds. The 700 handles link hover and info text. One hue, five roles — an accent only reads as brand when it appears in more than one place.\n      <\u002Fdiv>\n      <div style=\"font-size: 12px; color: var(--helper-text); font-family: 'IBM Plex Mono', monospace;\">Replaces: black primary buttons · neutral gray ring · ad-hoc <span style=\"color: var(--wiki-title);\">#2a56b0<\u002Fspan> hover<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Row: Badges -->\n    <div style=\"padding: 20px 0; border-bottom: 1px solid var(--border); font: 500 11px/1.4 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--helper-text); display:flex; align-items:flex-start; gap:10px;\">\n      <span style=\"display:inline-flex; gap:2px; margin-top:4px; flex-shrink:0;\">\n        <span style=\"width:6px; height:8px; background: var(--wiki-type-research-border);\"><\u002Fspan>\n        <span style=\"width:6px; height:8px; background: var(--wiki-type-skill-border);\"><\u002Fspan>\n        <span style=\"width:6px; height:8px; background: var(--wiki-type-decision-border);\"><\u002Fspan>\n      <\u002Fspan>\n      <span>02 · Badge family<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding: 20px 0 20px 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); padding-left: 24px;\">\n      <div style=\"font: 600 14px/1.3 'STIX Two Text', serif; color: var(--wiki-title); margin-bottom: 6px;\">Rebuilt 17 badges on a single OKLCH recipe<\u002Fdiv>\n      <div style=\"font-size: 13px; color: var(--wiki-article-text); margin-bottom: 10px;\">\n        Before: every badge was its own hand-picked triad of Tailwind hexes, so contrast was lumpy — <em>log<\u002Fem> whispered while <em>principles<\u002Fem> shouted. Now only the hue varies: <span class=\"font-mono\" style=\"font-size:12px;\">bg L 0.955 / C 0.035<\u002Fspan>, <span class=\"font-mono\" style=\"font-size:12px;\">text L 0.340 / C 0.180<\u002Fspan>, <span class=\"font-mono\" style=\"font-size:12px;\">border L 0.660 / C 0.150<\u002Fspan>. Result: a family that reads as a system, with constant legibility across all 17.\n      <\u002Fdiv>\n      <div style=\"font-size: 12px; color: var(--helper-text); margin-bottom: 6px;\">Two iterations on contrast:<\u002Fdiv>\n      <ol style=\"margin: 0 0 10px 18px; padding: 0; font-size: 12px; color: var(--helper-text); line-height: 1.55;\">\n        <li>First pass used L 0.42 text · L 0.87 borders — technically accessible but borders read as suggestions, not structure.<\u002Fli>\n        <li>Pushed text to L 0.34 / C 0.18 and borders to L 0.66 / C 0.15 — chips now hold their own edge against white without going heavy. Same recipe covers Wiki types (11 hues) and Fragment types (6 hues).<\u002Fli>\n      <\u002Fol>\n      <div style=\"font-size: 12px; color: var(--helper-text); font-family: 'IBM Plex Mono', monospace;\">Replaces: ~51 hand-tuned hex values across 17 components<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Row: Semantic -->\n    <div style=\"padding: 20px 0; border-bottom: 1px solid var(--border); font: 500 11px/1.4 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--helper-text); display:flex; align-items:flex-start; gap:10px;\">\n      <span style=\"display:inline-flex; gap:2px; margin-top:4px; flex-shrink:0;\">\n        <span style=\"width:6px; height:8px; background: var(--success-solid);\"><\u002Fspan>\n        <span style=\"width:6px; height:8px; background: var(--warning-solid);\"><\u002Fspan>\n        <span style=\"width:6px; height:8px; background: var(--danger-solid);\"><\u002Fspan>\n        <span style=\"width:6px; height:8px; background: var(--info-solid);\"><\u002Fspan>\n      <\u002Fspan>\n      <span>04 · Semantic states<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding: 20px 0 20px 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); padding-left: 24px;\">\n      <div style=\"font: 600 14px/1.3 'STIX Two Text', serif; color: var(--wiki-title); margin-bottom: 6px;\">Added success / warning / danger / info on the same recipe<\u002Fdiv>\n      <div style=\"font-size: 13px; color: var(--wiki-article-text); margin-bottom: 10px;\">\n        Validation, toasts, and dialogs used to lean on ad-hoc hexes. Four semantic triads (<span class=\"font-mono\" style=\"font-size:12px;\">--bg / --text / --border / --solid<\u002Fspan>) now inherit the badge ramp — success at H 155, warning at H 70–82, danger at H 25, info reuses the accent ramp. No new recipe, no new hues to remember; future components get predictable state color for free.\n      <\u002Fdiv>\n      <div style=\"font-size: 12px; color: var(--helper-text); font-family: 'IBM Plex Mono', monospace;\">Info = accent · Danger kept distinct from warning via hue, not saturation<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Row: Principles -->\n    <div style=\"padding: 20px 0; font: 500 11px/1.4 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--helper-text);\">\n      Principles\n    <\u002Fdiv>\n    <div style=\"padding: 20px 0 20px 24px; border-left: 1px solid var(--border); padding-left: 24px;\">\n      <ul style=\"margin: 0; padding: 0 0 0 18px; font-size: 13px; color: var(--wiki-article-text); line-height: 1.7;\">\n        <li><strong>One hue, many roles.<\u002Fstrong> An accent earns identity by showing up in primary action, link, focus, chip, and current-state — not by being mixed with a second blue elsewhere.<\u002Fli>\n        <li><strong>Vary the hue, fix the lightness.<\u002Fstrong> OKLCH lets the badge family stay legible across 17 colors without per-badge tuning. Hand-picking hexes reintroduces drift.<\u002Fli>\n        <li><strong>Contrast is structural, not decorative.<\u002Fstrong> Chip borders at L 0.66 do the work of separating clusters; without them badges bleed into each other at rest.<\u002Fli>\n        <li><strong>Ship reverts in daylight.<\u002Fstrong> The paper tone is a documented dead end, not a buried commit — future iterations know it was tried and why it didn't land.<\u002Fli>\n        <li><strong>Semantic tokens beat semantic hexes.<\u002Fstrong> Writing <span class=\"font-mono\" style=\"font-size:12px;\">var(--danger-text)<\u002Fspan> at the component layer is cheaper than remembering which red was the dialog red.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"margin-top: 96px; padding-top: 32px; border-top: 1px solid var(--wiki-meta-line); display:flex; justify-content:space-between; color: var(--wiki-count); font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing:0.08em;\">\n  <div>Robin Wiki · Design System v0.2<\u002Fdiv>\n  <div>Synced April 21, 2026<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
